<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div style="display: flex; justify-content: center; align-items: center; height: 100%;">
        <div style="width: 100%; max-width: 800px; background-color: #eef2f7; border-radius: 12px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            <h2 style="text-align: center; margin-bottom: 2rem;">Lista przejazdów</h2>
            <ul style="list-style: none; padding: 0; margin: 0;">
                <ul style="list-style: none; padding: 0; margin: 0;" th:if="${rides}">
                    <li th:each="ride : ${rides}">
                        🚗 Przejazd –
                        <div style="margin-top: 0.5rem; color: #555;">
                            📅
                            <span th:text="${#temporals.format(ride.date, 'dd.MM.yyyy HH:mm')}"></span>
                        </div>
                    </li>
                </ul>
            </ul>
        </div>
    </div>
</div>
</body>
</html>
