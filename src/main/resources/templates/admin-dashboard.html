<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">

    <h1 style="color: #2c3e50; margin-bottom: 0.5rem;">Dashboard</h1>
    <p style="color: #888; margin-bottom: 3rem;">Welcome to the admin panel.</p>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; align-items: stretch;">

        <a href="/admin/drivers" style="text-decoration: none; display: flex;">
            <div style="background: linear-gradient(135deg, #667eea, #764ba2);
                        border-radius: 12px; padding: 2rem; color: white; width: 100%;
                        transition: transform 0.2s, box-shadow 0.2s;
                        box-shadow: 0 4px 15px rgba(102,126,234,0.3);"
                 onmouseover="this.style.transform='translateY(-4px)'; this.style.boxShadow='0 8px 25px rgba(102,126,234,0.4)'"
                 onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 15px rgba(102,126,234,0.3)'">
                <div style="font-size: 2.5rem; margin-bottom: 1rem;">🚗</div>
                <h3 style="font-size: 1.2rem; margin-bottom: 0.5rem;">Driver Verification</h3>
                <p style="font-size: 0.9rem; opacity: 0.85;">Review and approve driver license submissions.</p>
            </div>
        </a>

        <a href="/admin/users" style="text-decoration: none; display: flex;">
            <div style="background: linear-gradient(135deg, #11998e, #38ef7d);
                        border-radius: 12px; padding: 2rem; color: white; width: 100%;
                        transition: transform 0.2s, box-shadow 0.2s;
                        box-shadow: 0 4px 15px rgba(17,153,142,0.3);"
                 onmouseover="this.style.transform='translateY(-4px)'; this.style.boxShadow='0 8px 25px rgba(17,153,142,0.4)'"
                 onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 15px rgba(17,153,142,0.3)'">
                <div style="font-size: 2.5rem; margin-bottom: 1rem;">👥</div>
                <h3 style="font-size: 1.2rem; margin-bottom: 0.5rem;">Users</h3>
                <p style="font-size: 0.9rem; opacity: 0.85;">Manage registered users and their accounts.</p>
            </div>
        </a>

        <a href="/admin/rides" style="text-decoration: none; display: flex;">
            <div style="background: linear-gradient(135deg, #f7971e, #ffd200);
                        border-radius: 12px; padding: 2rem; color: white; width: 100%;
                        transition: transform 0.2s, box-shadow 0.2s;
                        box-shadow: 0 4px 15px rgba(247,151,30,0.3);"
                 onmouseover="this.style.transform='translateY(-4px)'; this.style.boxShadow='0 8px 25px rgba(247,151,30,0.4)'"
                 onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 15px rgba(247,151,30,0.3)'">
                <div style="font-size: 2.5rem; margin-bottom: 1rem;">🗺️</div>
                <h3 style="font-size: 1.2rem; margin-bottom: 0.5rem;">Rides</h3>
                <p style="font-size: 0.9rem; opacity: 0.85;">Browse all planned and completed rides.</p>
            </div>
        </a>

    </div>

</div>
</body>
</html>
