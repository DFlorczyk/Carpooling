<!-- templates/fragments/ride-details.html -->
<!-- Fragment widoku szczegółów przejazdu z mapą trasy -->
<div th:fragment="content">

    <div class="container mt-4">
        <a href="/rides" class="btn btn-outline-secondary btn-sm mb-3">
            <i class="bi bi-arrow-left"></i> Powrót do listy
        </a>

        <h2 class="mb-4">Szczegóły przejazdu</h2>

        <div class="row">
            <!-- ── Informacje (lewa kolumna) ───────────────────────── -->
            <div class="col-md-5">
                <div class="card shadow-sm mb-3">
                    <div class="card-header bg-primary text-white">
                        <i class="bi bi-car-front-fill"></i> Trasa
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="small text-muted">Skąd:</label>
                            <div class="fw-bold">
                                <i class="bi bi-geo-alt-fill text-success"></i>
                                <span th:text="${ride.startAddress}">-</span>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="small text-muted">Dokąd:</label>
                            <div class="fw-bold">
                                <i class="bi bi-geo-alt-fill text-danger"></i>
                                <span th:text="${ride.endAddress}">-</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm mb-3">
                    <div class="card-header">
                        <i class="bi bi-info-circle"></i> Informacje
                    </div>
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item d-flex justify-content-between">
                            <span><i class="bi bi-calendar-event"></i> Data wyjazdu</span>
                            <strong th:text="${#temporals.format(ride.departureDate, 'dd.MM.yyyy HH:mm')}">-</strong>
                        </li>
                        <li class="list-group-item d-flex justify-content-between">
                            <span><i class="bi bi-cash"></i> Koszt</span>
                            <strong th:text="${ride.cost + ' PLN'}">-</strong>
                        </li>
                        <li class="list-group-item d-flex justify-content-between">
                            <span><i class="bi bi-people-fill"></i> Wolne miejsca</span>
                            <strong th:text="${ride.availableSeats}">-</strong>
                        </li>
                        <li class="list-group-item d-flex justify-content-between"
                            th:if="${ride.distanceKm != null}">
                            <span><i class="bi bi-signpost-2"></i> Dystans</span>
                            <strong th:text="${ride.distanceKm + ' km'}">-</strong>
                        </li>
                        <li class="list-group-item d-flex justify-content-between"
                            th:if="${ride.durationMinutes != null}">
                            <span><i class="bi bi-clock"></i> Czas przejazdu</span>
                            <strong th:text="${ride.durationMinutes + ' min'}">-</strong>
                        </li>
                        <li class="list-group-item d-flex justify-content-between">
                            <span><i class="bi bi-person-circle"></i> Kierowca</span>
                            <strong th:text="${ride.driverName}">-</strong>
                        </li>
                        <li class="list-group-item d-flex justify-content-between">
                            <span><i class="bi bi-tag"></i> Status</span>
                            <span class="badge bg-success" th:text="${ride.stateName}">-</span>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- ── Mapa trasy (prawa kolumna) ──────────────────────── -->
            <div class="col-md-7">
                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <div id="detailMap" style="height: 550px; border-radius: 0.375rem;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Google Maps – wyświetlanie trasy ─────────────────────────── -->
    <script th:src="'https://maps.googleapis.com/maps/api/js?key=' + ${googleMapsApiKey} + '&callback=initDetailMap'"
            async defer></script>

    <script th:inline="javascript">
        const rideStartLat = /*[[${ride.startLatitude}]]*/ 0;
        const rideStartLng = /*[[${ride.startLongitude}]]*/ 0;
        const rideEndLat   = /*[[${ride.endLatitude}]]*/ 0;
        const rideEndLng   = /*[[${ride.endLongitude}]]*/ 0;

        function initDetailMap() {
            const map = new google.maps.Map(document.getElementById('detailMap'), {
                zoom: 7,
                center: { lat: (rideStartLat + rideEndLat) / 2, lng: (rideStartLng + rideEndLng) / 2 },
                mapTypeControl: false,
                streetViewControl: false
            });

            const directionsService = new google.maps.DirectionsService();
            const directionsRenderer = new google.maps.DirectionsRenderer({
                map: map,
                polylineOptions: {
                    strokeColor: '#4285F4',
                    strokeWeight: 5
                }
            });

            directionsService.route({
                origin: { lat: rideStartLat, lng: rideStartLng },
                destination: { lat: rideEndLat, lng: rideEndLng },
                travelMode: google.maps.TravelMode.DRIVING
            }, function (result, status) {
                if (status === 'OK') {
                    directionsRenderer.setDirections(result);
                }
            });
        }
    </script>
</div>
