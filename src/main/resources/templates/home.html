<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="content">

    <h1>Home Page</h1>

    <input id="citySearch" placeholder="Search city..." style="width:300px;padding:0.5rem;margin-bottom:1rem;" />

    <div id="map" style="width:100%;height:400px;border-radius:12px;"></div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        const backendCity = [[${backendCity}]];
        let geocoder, map;

        function initMap() {
            geocoder = new google.maps.Geocoder();

            if (backendCity) {
                geocodeCity(backendCity);
            } else {
                detectLocation();
            }

            setupSearch();
        }

        function detectLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        const coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        renderMap(coords);
                        reverseGeocode(coords);
                    },
                    () => geocodeCity("Warsaw") // fallback
                );
            } else {
                geocodeCity("Warsaw");
            }
        }

        function geocodeCity(city) {
            geocoder.geocode({ address: city }, (results, status) => {
                if (status === "OK") renderMap(results[0].geometry.location);
            });
        }

        function reverseGeocode(coords) {
            geocoder.geocode({ location: coords }, (results) => {
                if (results && results[0]) document.getElementById("citySearch").value = extractCity(results[0]);
            });
        }

        function extractCity(result) {
            for (const c of result.address_components) {
                if (c.types.includes("locality")) return c.long_name;
            }
            return "";
        }

        function renderMap(location) {
            map = new google.maps.Map(document.getElementById("map"), { center: location, zoom: 12 });
            new google.maps.Marker({ map, position: location });
        }

        function setupSearch() {
            const input = document.getElementById("citySearch");
            const autocomplete = new google.maps.places.Autocomplete(input, { types: ["(cities)"] });

            autocomplete.addListener("place_changed", () => {
                const place = autocomplete.getPlace();
                if (!place.geometry) return;

                renderMap(place.geometry.location);

                fetch("/api/user/city", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ city: place.name })
                });
            });
        }
        /*]]>*/
    </script>

    <script th:src="@{'https://maps.googleapis.com/maps/api/js?key=' + ${googleMapsApiKey} + '&libraries=places&callback=initMap'}" async defer></script>

</div>

</body>
</html>
