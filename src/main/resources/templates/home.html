<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="content">

    <div class="container">
        <div class="sidebar">
            <h2>Available Rides</h2>
            <div id="ridesList"></div>
        </div>
        <div class="map-section">
            <input id="citySearch" placeholder="Search city..." />
            <div id="map"></div>
        </div>
    </div>

    <style>
        .container { display: flex; width: 100%; height: 100%; }
        .sidebar { width: 30%; background: #f4f6fb; padding: 1rem; overflow-y: auto; }
        .map-section { flex: 1; display: flex; flex-direction: column; }
        #map { flex: 1; width: 100%; }
        #citySearch { padding: 0.5rem; margin: 10px; width: 300px; }
        .ride-card { background: #e9edf7; padding: 10px; margin-bottom: 10px; border-radius: 8px; cursor: pointer; }
        .ride-route { font-weight: 600; margin-bottom: 4px; }
        .ride-meta { font-size: 0.82rem; color: #555; display: flex; gap: 1rem; margin-bottom: 6px; }
        .details-btn { border: 1px solid #ccc; background: #fff; border-radius: 6px; padding: 3px 10px; cursor: pointer; font-size: 0.78rem; }
        .ride-details { margin-top: 8px; font-size: 0.82rem; color: #444; }
    </style>

    <script th:inline="javascript">
        /*<![CDATA[*/

        const backendCity = [[${backendCity}]];
        let map;

        function initMap() {
            const defaultLoc = { lat: 52.2297, lng: 21.0122 };
            map = new google.maps.Map(document.getElementById("map"), {
                center: defaultLoc,
                zoom: 12
            });
            loadRides();
        }

        function loadRides() {
            fetch("/api/r/rides/not-started")
                .then(res => res.json())
                .then(data => renderRides(data))
                .catch(err => console.error("ERROR:", err));
        }

        function reverseGeocodeLatLng(lat, lng) {
            return new Promise((resolve) => {
                const geocoder = new google.maps.Geocoder();
                geocoder.geocode({ location: { lat, lng } }, (results, status) => {
                    if (status === "OK" && results[0]) {
                        const components = results[0].address_components;
                        const neighbourhood = components.find(c => c.types.includes("neighbourhood") || c.types.includes("sublocality"));
                        const district = components.find(c => c.types.includes("administrative_area_level_2"));
                        const city = components.find(c => c.types.includes("locality"));
                        resolve(neighbourhood?.long_name || district?.long_name || city?.long_name || results[0].formatted_address);
                    } else {
                        resolve(`${lat}, ${lng}`);
                    }
                });
            });
        }

        function renderRides(rides) {
            const container = document.getElementById("ridesList");
            container.innerHTML = "";

            if (!rides || !Array.isArray(rides) || rides.length === 0) {
                container.innerHTML = "<p>No rides found</p>";
                return;
            }

            rides.forEach(async r => {
                const el = document.createElement("div");
                el.className = "ride-card";

                const date = new Date(r.date);
                const formattedDate = date.toLocaleDateString("pl-PL") + " " + date.toLocaleTimeString("pl-PL", { hour: "2-digit", minute: "2-digit" });

                el.innerHTML = `
                    <div class="ride-route">Loading...</div>
                    <div class="ride-meta">
                        <span>${r.driverName ?? 'No driver'}</span>
                        <span>${r.cost} zł</span>
                        <span>${formattedDate}</span>
                    </div>
                    <button class="details-btn" onclick="event.stopPropagation(); toggleDetails(this)">Details</button>
                    <div class="ride-details" style="display:none">
                        <div>${r.carModel ?? 'Unknown'} — ${r.carColor ?? ''}</div>
                        <div>Seats: ${r.carSeats ?? '?'}</div>
                        <div>Mileage: ${r.carMileage ?? '?'} km</div>
                        <div>State: ${r.stateName ?? 'unknown'}</div>
                    </div>
                `;

                el.addEventListener("click", () => {
                    showRoute(
                        { lat: r.startLatitude, lng: r.startLongitude },
                        { lat: r.endLatitude, lng: r.endLongitude }
                    );
                });

                container.appendChild(el);

                const [startName, endName] = await Promise.all([
                    reverseGeocodeLatLng(r.startLatitude, r.startLongitude),
                    reverseGeocodeLatLng(r.endLatitude, r.endLongitude)
                ]);

                el.querySelector(".ride-route").textContent = `${startName} → ${endName}`;
            });
        }

        function showRoute(startLatLng, endLatLng) {
            if (!map) return;
            const directionsService = new google.maps.DirectionsService();
            const directionsRenderer = new google.maps.DirectionsRenderer({
                polylineOptions: { strokeColor: "#4f46e5", strokeWeight: 5 }
            });
            directionsRenderer.setMap(map);
            directionsService.route(
                { origin: startLatLng, destination: endLatLng, travelMode: google.maps.TravelMode.DRIVING },
                (result, status) => {
                    if (status === "OK") directionsRenderer.setDirections(result);
                }
            );
        }

        function toggleDetails(btn) {
            const details = btn.nextElementSibling;
            details.style.display = details.style.display === "none" ? "block" : "none";
        }

        window.initMap = initMap;

        /*]]>*/
    </script>

    <script th:src="@{'https://maps.googleapis.com/maps/api/js?key=' + ${googleMapsApiKey} + '&callback=initMap'}" async defer></script>

</div>

</body>
</html>
