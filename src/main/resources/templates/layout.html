<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Carpooling</title>


    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 2rem;
        }

        .nav-content {
            max-width: 1800px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 1rem;
            align-items: center;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            color: white;
            text-decoration: none;
            margin: auto;
        }

        nav {
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .nav-link {
            text-decoration: none;
            color: #333;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            background-color: #f8f9fa;
        }

        main {
            flex: 1;
            width: 100%;
            margin: 1rem 0;
            padding: 0 1rem;
            display: flex;
            flex-direction: column;
        }

         .content-card {
            background: white;
            border-radius: 12px;
            display: flex;
            overflow: hidden;
            width: 100%;
            flex: 1;
        }

        .content-card > div {
            display: flex;
            width: 100%;
            height: 100%;
        }
        .content-card.normal {
            height: auto;
            min-height: 400px;
            padding: 2rem;
            display: block;
            overflow-y: auto;
        }

        .content-card.normal > div {
            display: block;
            width: 100%;
            height: auto;
        }
    </style>
</head>

<body>

<header>
    <div class="nav-content">
        <a href="/" class="logo">Carpooling</a>
<!--        <div style="font-size: 1.1rem;">Witamy</div>-->
        <a href="/logout" class="nav-link">Wyloguj</a>
    </div>
</header>

<nav>
    <div class="nav-content">
        <a href="/" class="nav-link" th:classappend="${pageTitle == 'Home'} ? 'active' : ''">Home</a>
        <a href="/profile" class="nav-link" th:classappend="${pageTitle == 'Profile'} ? 'active' : ''">Profile </a>
        <a href="/settings" class="nav-link" th:classappend="${pageTitle == 'Settings'} ? 'active' : ''">Settings</a>
        <a href="/help" class="nav-link" th:classappend="${pageTitle == 'Help'} ? 'active' : ''">Help</a>
        <a href="/rides/create" class="nav-link" th:classappend="${pageTitle == 'Plan'} ? 'active' : ''">Plan</a>
    </div>
</nav>

<main>
    <div class="content-card" th:classappend="${pageTitle == 'Home'} ? 'full-height' : 'normal'">
        <div th:replace="~{${view} :: content}"></div>
    </div>
</main>

<footer>
</footer>
</body>
</html>
