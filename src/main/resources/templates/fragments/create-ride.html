<!-- templates/fragments/create-ride.html -->
<!-- Fragment widoku formularza dodawania przejazdu z Google Maps -->
<div th:fragment="content" xmlns:th="http://www.w3.org/1999/xhtml">

    <div class="container mt-4">
        <h2 class="mb-4">Dodaj nowy przejazd</h2>

        <!-- Komunikaty -->
        <div id="alertSuccess" class="alert alert-success d-none" role="alert"></div>
        <div id="alertError" class="alert alert-danger d-none" role="alert"></div>

        <div class="row">
            <!-- ── Formularz (lewa kolumna) ────────────────────────── -->
            <div class="col-md-5">
                <div class="card shadow-sm">
                    <div class="card-body">

                        <!-- Punkt startowy -->
                        <div class="mb-3">
                            <label for="startAddress" class="form-label fw-bold">
                                <i class="bi bi-geo-alt-fill text-success"></i> Miejsce startu
                            </label>
                            <input type="text" id="startAddress" class="form-control"
                                   placeholder="Wpisz adres startowy..." autocomplete="off"/>
                        </div>

                        <!-- Punkt docelowy -->
                        <div class="mb-3">
                            <label for="endAddress" class="form-label fw-bold">
                                <i class="bi bi-geo-alt-fill text-danger"></i> Miejsce docelowe
                            </label>
                            <input type="text" id="endAddress" class="form-control"
                                   placeholder="Wpisz adres docelowy..." autocomplete="off"/>
                        </div>

                        <!-- Data i czas -->
                        <div class="mb-3">
                            <label for="departureDate" class="form-label fw-bold">
                                <i class="bi bi-calendar-event"></i> Data i godzina wyjazdu
                            </label>
                            <input type="datetime-local" id="departureDate" class="form-control" required/>
                        </div>

                        <!-- Koszt -->
                        <div class="mb-3">
                            <label for="cost" class="form-label fw-bold">
                                <i class="bi bi-cash"></i> Koszt na osobę (PLN)
                            </label>
                            <input type="number" id="cost" class="form-control"
                                   min="0" step="0.50" value="0" placeholder="np. 25.00"/>
                        </div>

                        <!-- Dostępne miejsca -->
                        <div class="mb-3">
                            <label for="availableSeats" class="form-label fw-bold">
                                <i class="bi bi-people-fill"></i> Liczba wolnych miejsc
                            </label>
                            <input type="number" id="availableSeats" class="form-control"
                                   min="1" max="8" value="3"/>
                        </div>

                        <!-- Info o trasie (wypełniane automatycznie) -->
                        <div id="routeInfo" class="card bg-light mb-3 d-none">
                            <div class="card-body py-2">
                                <small class="text-muted">Informacje o trasie:</small>
                                <div class="d-flex justify-content-between mt-1">
                                    <span><i class="bi bi-signpost-2"></i> <span id="distanceInfo">-</span></span>
                                    <span><i class="bi bi-clock"></i> <span id="durationInfo">-</span></span>
                                </div>
                            </div>
                        </div>

                        <!-- Ukryte pola -->
                        <input type="hidden" id="startLatitude"/>
                        <input type="hidden" id="startLongitude"/>
                        <input type="hidden" id="endLatitude"/>
                        <input type="hidden" id="endLongitude"/>
                        <input type="hidden" id="encodedPolyline"/>
                        <input type="hidden" id="distanceKm"/>
                        <input type="hidden" id="durationMinutes"/>

                        <button id="submitRideBtn" class="btn btn-primary w-100 mt-2"
                                onclick="submitRide()" disabled>
                            <i class="bi bi-plus-circle"></i> Dodaj przejazd
                        </button>
                    </div>
                </div>
            </div>

            <!-- ── Mapa Google (prawa kolumna) ─────────────────────── -->
            <div class="col-md-7">
                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <div id="map" style="height: 550px; border-radius: 0.375rem;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Skrypty Google Maps ──────────────────────────────────────── -->
    <script th:src="'https://maps.googleapis.com/maps/api/js?key=' + ${googleMapsApiKey} + '&libraries=places&callback=initMap'"
            async defer></script>

    <script th:inline="javascript">
        let map, directionsService, directionsRenderer;
        let startMarker, endMarker;
        let startAutocomplete, endAutocomplete;

        // Dane trasy
        let routeData = {
            startLat: null, startLng: null,
            endLat: null, endLng: null,
            startAddr: null, endAddr: null,
            distanceKm: null, durationMin: null,
            polyline: null
        };

        // ── Inicjalizacja mapy ──────────────────────────────────────

        function initMap() {
            const defaultCenter = { lat: 52.2297, lng: 21.0122 }; // Warszawa

            map = new google.maps.Map(document.getElementById('map'), {
                zoom: 7,
                center: defaultCenter,
                mapTypeControl: false,
                streetViewControl: false
            });

            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({
                map: map,
                suppressMarkers: false,
                polylineOptions: {
                    strokeColor: '#4285F4',
                    strokeWeight: 5
                }
            });

            // Autocomplete dla pola startowego
            startAutocomplete = new google.maps.places.Autocomplete(
                document.getElementById('startAddress'), {
                    types: ['geocode'],
                    componentRestrictions: { country: 'pl' }
                }
            );
            startAutocomplete.addListener('place_changed', function () {
                const place = startAutocomplete.getPlace();
                if (!place.geometry) return;

                routeData.startLat = place.geometry.location.lat();
                routeData.startLng = place.geometry.location.lng();
                routeData.startAddr = place.formatted_address;

                document.getElementById('startLatitude').value = routeData.startLat;
                document.getElementById('startLongitude').value = routeData.startLng;

                tryCalculateRoute();
            });

            // Autocomplete dla pola docelowego
            endAutocomplete = new google.maps.places.Autocomplete(
                document.getElementById('endAddress'), {
                    types: ['geocode'],
                    componentRestrictions: { country: 'pl' }
                }
            );
            endAutocomplete.addListener('place_changed', function () {
                const place = endAutocomplete.getPlace();
                if (!place.geometry) return;

                routeData.endLat = place.geometry.location.lat();
                routeData.endLng = place.geometry.location.lng();
                routeData.endAddr = place.formatted_address;

                document.getElementById('endLatitude').value = routeData.endLat;
                document.getElementById('endLongitude').value = routeData.endLng;

                tryCalculateRoute();
            });
        }

        // ── Obliczanie trasy ────────────────────────────────────────

        function tryCalculateRoute() {
            if (!routeData.startLat || !routeData.endLat) return;

            const request = {
                origin: { lat: routeData.startLat, lng: routeData.startLng },
                destination: { lat: routeData.endLat, lng: routeData.endLng },
                travelMode: google.maps.TravelMode.DRIVING
            };

            directionsService.route(request, function (result, status) {
                if (status === 'OK') {
                    directionsRenderer.setDirections(result);

                    const leg = result.routes[0].legs[0];
                    const distKm = (leg.distance.value / 1000).toFixed(1);
                    const durMin = Math.ceil(leg.duration.value / 60);
                    const polyline = result.routes[0].overview_polyline;

                    routeData.distanceKm = parseFloat(distKm);
                    routeData.durationMin = durMin;
                    routeData.polyline = polyline;

                    // Aktualizacja UI
                    document.getElementById('distanceInfo').textContent = distKm + ' km';
                    document.getElementById('durationInfo').textContent = durMin + ' min';
                    document.getElementById('routeInfo').classList.remove('d-none');

                    document.getElementById('distanceKm').value = distKm;
                    document.getElementById('durationMinutes').value = durMin;
                    document.getElementById('encodedPolyline').value = polyline;

                    document.getElementById('submitRideBtn').disabled = false;
                } else {
                    alert('Nie udało się obliczyć trasy: ' + status);
                }
            });
        }

        // ── Wysłanie formularza ─────────────────────────────────────

        function submitRide() {
            const departureDate = document.getElementById('departureDate').value;
            if (!departureDate) {
                showAlert('alertError', 'Podaj datę i godzinę wyjazdu.');
                return;
            }

            const payload = {
                startAddress: routeData.startAddr || document.getElementById('startAddress').value,
                startLatitude: routeData.startLat,
                startLongitude: routeData.startLng,
                endAddress: routeData.endAddr || document.getElementById('endAddress').value,
                endLatitude: routeData.endLat,
                endLongitude: routeData.endLng,
                departureDate: departureDate,
                cost: parseFloat(document.getElementById('cost').value) || 0,
                availableSeats: parseInt(document.getElementById('availableSeats').value) || 3,
                distanceKm: routeData.distanceKm,
                durationMinutes: routeData.durationMin,
                encodedPolyline: routeData.polyline
            };

            document.getElementById('submitRideBtn').disabled = true;
            document.getElementById('submitRideBtn').innerHTML =
                '<span class="spinner-border spinner-border-sm"></span> Dodawanie...';

            fetch('/api/rides', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    showAlert('alertError', data.error);
                    resetButton();
                } else {
                    showAlert('alertSuccess',
                        'Przejazd dodany pomyślnie! Przekierowanie...');
                    setTimeout(() => window.location.href = '/rides/' + data.rideId, 1500);
                }
            })
            .catch(err => {
                showAlert('alertError', 'Wystąpił błąd: ' + err.message);
                resetButton();
            });
        }

        function resetButton() {
            const btn = document.getElementById('submitRideBtn');
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-plus-circle"></i> Dodaj przejazd';
        }

        function showAlert(id, message) {
            const el = document.getElementById(id);
            el.textContent = message;
            el.classList.remove('d-none');
            setTimeout(() => el.classList.add('d-none'), 5000);
        }
    </script>
</div>
