<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejestracja</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f3f3f3;
        }

        .topbar {
            background: linear-gradient(90deg, #5a63f1, #9c48f0);
            color: white;
            padding: 20px 40px;
            font-size: 26px;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .container {
            margin: 60px auto;
            width: 420px;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #444;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #555;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 15px;
            transition: 0.2s;
        }

        .input-group input:focus {
            border-color: #6b5df6;
            outline: none;
            box-shadow: 0 0 5px rgba(107,93,246,0.4);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #6b5df6, #a43ef6);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            opacity: 0.88;
        }

        .login-link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .login-link a {
            color: #6b5df6;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .message {
            text-align: center;
            margin-top: 20px;
            font-size: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="topbar">Carpooling</div>

<div class="container">
    <h2>Utwórz konto</h2>

    <form id="registrationForm">
        <div class="input-group">
            <label>Imię</label>
            <input id="name" type="text" placeholder="Wpisz imię" required>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input id="email" type="email" placeholder="Podaj email" required>
        </div>

        <div class="input-group">
            <label>Hasło</label>
            <input id="password" type="password" placeholder="Wpisz hasło" required>
        </div>

        <div class="input-group">
            <label>Powtórz hasło</label>
            <input id="confirmPassword" type="password" placeholder="Powtórz hasło" required>
        </div>

        <button class="btn" type="submit">Zarejestruj się</button>

        <div class="login-link">
            Masz już konto? <a href="#">Zaloguj się</a>
        </div>
    </form>

    <div class="message" id="message"></div>
</div>

<script>
    document.getElementById("registrationForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const password = document.getElementById("password").value;
        const confirm = document.getElementById("confirmPassword").value;

        if (password !== confirm) {
            const message = document.getElementById("message");
            message.style.color = "red";
            message.textContent = "Hasła nie są identyczne!";
            return;
        }

        const data = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            password: password
        };

        // Używamy /auth/register zamiast pełnego adresu localhost
        const response = await fetch("/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        const message = document.getElementById("message");
        if (response.ok) {
            message.style.color = "green";
            message.textContent = "Zarejestrowano! Przekierowanie do logowania...";
            setTimeout(() => {
                window.location.href = "/login"; // Przekierowanie po 2 sekundach
            }, 2000);
        } else {
            message.style.color = "red";
            message.textContent = await response.text();
        }
    });
</script>

</body>
</html>
